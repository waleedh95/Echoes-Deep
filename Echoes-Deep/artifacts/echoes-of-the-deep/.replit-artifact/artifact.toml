kind = "web"
previewPath = "/"
title = "Echoes of the Deep"
version = "1.0.0"
id = "artifacts/echoes-of-the-deep"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19390

[services.development]
run = "pnpm --filter @workspace/echoes-of-the-deep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echoes-of-the-deep", "run", "build" ]
publicDir = "artifacts/echoes-of-the-deep/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19390"
BASE_PATH = "/"
